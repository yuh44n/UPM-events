  <circle cx="10" cy="54" r="2" fill="#C9A84C" opacity="0.7"/>
  <circle cx="19" cy="54" r="2" fill="#C9A84C" opacity="0.7"/>
  <circle cx="28" cy="54" r="2" fill="#C9A84C" opacity="0.7"/>
  <!-- Gold star -->
  <polygon points="50,42 51.5,46.5 56.5,46.5 52.5,49.5 54,54 50,51 46,54 47.5,49.5 43.5,46.5 48.5,46.5" fill="#C9A84C" opacity="0.9"/>
