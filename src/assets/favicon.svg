  <rect x="50" y="4" width="5" height="36" rx="2.5" fill="#C9A84C" transform="rotate(-18, 52, 22)" opacity="0.75"/>
  <rect x="58" y="4" width="5" height="40" rx="2.5" fill="#C9A84C" transform="rotate(-18, 60, 24)" opacity="0.55"/>
